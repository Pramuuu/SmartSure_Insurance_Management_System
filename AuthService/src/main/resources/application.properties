spring.application.name=authservice

# FIX: server.port was missing entirely.
# Without this fallback, when the Config Server is offline Spring Boot
# starts on the default port 8080 ? which clashes with the API Gateway
# (also port 8080). Both services then fail to start or one silently
# hijacks the other's port, breaking the entire stack in local dev.
server.port=8081

spring.config.import=optional:configserver:
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# ===============================
# EUREKA
# ===============================
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

# ===============================
# DATABASE
# ===============================
spring.datasource.url=${DB_AUTH_URL:jdbc:mysql://localhost:3306/authservice_database?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:pramod280504}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA
# FIX: ddl-auto was missing. Without it, Hibernate uses its own default
# (which is 'none' in many versions), so tables are never created/updated
# on first run and the app throws TableNotFoundException at startup.
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# ===============================
# SECURITY
# ===============================
jwt.secret=${JWT_SECRET:767BI36HSIUNYD7352198N1SV12BS62428748NDH7878BXB7B65D326B67SBVV6VS62545265776XBHG}
jwt.expiration=${JWT_EXPIRATION:86400000}
internal.secret=${INTERNAL_SECRET:JHGUY72638DEGWRT7D4365N89SOQL89234Y3IUTBR7DT4NQ3479387DNBYFGR366746823BETYX}

# ===============================
# REDIS ? OTP storage
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# ===============================
# MAIL ? OTP sending
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:pramodkatchala@gmail.com}
spring.mail.password=${MAIL_PASSWORD:vttkqfymujvgobzw}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


resilience4j.timelimiter.instances.authServiceCB.timeout-duration=15s

# ===============================
# OBSERVABILITY
# ===============================
management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:0.1}
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.access=unrestricted
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# ===============================
# LOKI
# ===============================
loki.url=${LOKI_URL:http://localhost:3100}
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# ===============================
# DEVTOOLS
# ===============================
spring.devtools.restart.enabled=false