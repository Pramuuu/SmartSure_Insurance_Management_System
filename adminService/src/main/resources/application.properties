spring.application.name=adminservice
server.port=8085

spring.config.import=optional:configserver:
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# ===============================
# DATABASE (local fallback)
# ===============================
spring.datasource.url=${DB_ADMIN_URL:jdbc:mysql://localhost:3306/adminService_database?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:pramod280504}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===============================
# EUREKA
# ===============================
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

# ===============================
# SECURITY
# FIX: was truncated "JHGUY72638..." ? must be the full secret.
# Without this, InternalRequestFilter returns 403 for every request
# when Config Server is not running (local dev).
# ===============================
internal.secret=${INTERNAL_SECRET:JHGUY72638DEGWRT7D4365N89SOQL89234Y3IUTBR7DT4NQ3479387DNBYFGR366746823BETYX}

# ===============================
# RABBITMQ
# ===============================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:smartsure}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:smartsure}
spring.rabbitmq.virtual-host=/
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=3000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000

# ===============================
# MAIL
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:pramodkatchala@gmail.com}
spring.mail.password=${MAIL_PASSWORD:vttkqfymujvgobzw}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===============================
# REDIS
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=none

# ===============================
# OBSERVABILITY
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches,loggers
management.endpoint.prometheus.access=unrestricted
management.endpoint.health.show-details=always
management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:0.1}
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# ===============================
# LOKI
# ===============================
loki.url=${LOKI_URL:http://localhost:3100}
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

spring.devtools.restart.enabled=false