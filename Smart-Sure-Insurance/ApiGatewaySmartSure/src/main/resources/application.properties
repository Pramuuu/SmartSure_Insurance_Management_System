spring.application.name=ApiGatewaySmartSure
server.port=8080
spring.profiles.active=
spring.config.import=optional:configserver:
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# ===============================
# EUREKA
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1

# ===============================
# DISCOVERY LOCATOR - MUST BE FALSE
# ===============================
spring.cloud.gateway.server.webflux.discovery.locator.enabled=false

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:767BI36HSIUNYD7352198N1SV12BS62428748NDH7878BXB7B65D326B67SBVV6VS62545265776XBHG}
jwt.expiration=${JWT_EXPIRATION:86400000}
internal.secret=${INTERNAL_SECRET:JHGUY72638DEGWRT7D4365N89SOQL89234Y3IUTBR7DT4NQ3479387DNBYFGR366746823BETYX}

# ===============================
# CORS
# ===============================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

# ===============================
# REDIS - Rate Limiting
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# ===============================
# ROUTES
# FIX: uri is now inside each route block (not appended at the bottom)
# Using http://localhost:PORT to bypass Eureka lb:// which was resolving
# to 172.22.137.29 (WSL2 IP) causing 503 Service Unavailable
# ===============================

# --- Route 0: AuthService /api/auth/** ---
spring.cloud.gateway.server.webflux.routes[0].id=authServiceApi
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.name=authServiceCB
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.fallbackUri=forward:/fallback/auth

# --- Route 1: AuthService /user/** ---
spring.cloud.gateway.server.webflux.routes[1].id=authServiceUser
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/user/**
spring.cloud.gateway.server.webflux.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.name=authServiceCB
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.fallbackUri=forward:/fallback/auth

# --- Route 2: PolicyService /api/policies/** ---
spring.cloud.gateway.server.webflux.routes[2].id=policyServicePolicies
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/policies/**
spring.cloud.gateway.server.webflux.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[2].filters[0].args.name=policyServiceCB
spring.cloud.gateway.server.webflux.routes[2].filters[0].args.fallbackUri=forward:/fallback/policy

# --- Route 3: PolicyService /api/policy-types/** ---
spring.cloud.gateway.server.webflux.routes[3].id=policyServiceTypes
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/policy-types/**
spring.cloud.gateway.server.webflux.routes[3].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[3].filters[0].args.name=policyServiceCB
spring.cloud.gateway.server.webflux.routes[3].filters[0].args.fallbackUri=forward:/fallback/policy

# --- Route 4: ClaimService /api/claims/** ---
spring.cloud.gateway.server.webflux.routes[4].id=claimService
spring.cloud.gateway.server.webflux.routes[4].uri=http://localhost:8083
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/claims/**
spring.cloud.gateway.server.webflux.routes[4].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[4].filters[0].args.name=claimServiceCB
spring.cloud.gateway.server.webflux.routes[4].filters[0].args.fallbackUri=forward:/fallback/claim

# --- Route 5: AdminService /api/admin/** ---
spring.cloud.gateway.server.webflux.routes[5].id=adminService
spring.cloud.gateway.server.webflux.routes[5].uri=http://localhost:8085
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/admin/**
spring.cloud.gateway.server.webflux.routes[5].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[5].filters[0].args.name=adminServiceCB
spring.cloud.gateway.server.webflux.routes[5].filters[0].args.fallbackUri=forward:/fallback/admin

# --- Route 6: PaymentService /api/payments/** ---
spring.cloud.gateway.server.webflux.routes[6].id=paymentService
spring.cloud.gateway.server.webflux.routes[6].uri=http://localhost:8084
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/payments/**
spring.cloud.gateway.server.webflux.routes[6].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[6].filters[0].args.name=paymentServiceCB
spring.cloud.gateway.server.webflux.routes[6].filters[0].args.fallbackUri=forward:/fallback/payment

# ===============================
# RESILIENCE4J CIRCUIT BREAKER
# ===============================
resilience4j.circuitbreaker.instances.authServiceCB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.authServiceCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.authServiceCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.authServiceCB.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.authServiceCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.authServiceCB.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.policyServiceCB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.policyServiceCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.policyServiceCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.policyServiceCB.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.policyServiceCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.policyServiceCB.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.claimServiceCB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.claimServiceCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.claimServiceCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.claimServiceCB.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.claimServiceCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.claimServiceCB.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.adminServiceCB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.adminServiceCB.sliding-window-size=5
resilience4j.circuitbreaker.instances.adminServiceCB.failure-rate-threshold=40
resilience4j.circuitbreaker.instances.adminServiceCB.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.adminServiceCB.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.adminServiceCB.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.paymentServiceCB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.paymentServiceCB.sliding-window-size=5
resilience4j.circuitbreaker.instances.paymentServiceCB.failure-rate-threshold=30
resilience4j.circuitbreaker.instances.paymentServiceCB.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.paymentServiceCB.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.paymentServiceCB.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.timelimiter.instances.authServiceCB.timeout-duration=30s
resilience4j.timelimiter.instances.policyServiceCB.timeout-duration=30s
resilience4j.timelimiter.instances.claimServiceCB.timeout-duration=30s
resilience4j.timelimiter.instances.adminServiceCB.timeout-duration=30s
resilience4j.timelimiter.instances.paymentServiceCB.timeout-duration=30s

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,gateway,circuitbreakers
management.endpoint.gateway.access=unrestricted
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.security=WARN
logging.level.com.smartSure.ApiGatewaySmartSure=INFO

# Fail open - don't block requests if Redis has issues
spring.cloud.gateway.filter.request-rate-limiter.deny-empty-key=false