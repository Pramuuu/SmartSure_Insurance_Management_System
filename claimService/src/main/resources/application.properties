# ===============================
# CLAIM FILE STORAGE
# FIX: was hardcoded to C:/SmartSure/claim-files which only works on Windows.
# On Linux or Mac this path doesn't exist and all claim file uploads/downloads
# fail with FileNotFoundException at runtime.
# Changed to use an env var with a relative cross-platform fallback.
# In production: set CLAIM_STORAGE_PATH to an absolute path, e.g. /opt/smartsure/claim-files
# In local dev: files will be written to ./claim-files (relative to the service working dir)
# ===============================
claim.file.storage.path=${CLAIM_STORAGE_PATH:./claim-files}

# Auto-approval threshold ? claims below this amount are approved instantly
# Set to 0 to disable auto-approval entirely
claim.auto.approval.threshold=${CLAIM_AUTO_APPROVAL_THRESHOLD:10000}

# ===============================
# FILE UPLOAD LIMITS
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# OBSERVABILITY
# ===============================
management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:0.1}
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.access=unrestricted
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# ===============================
# LOKI
# ===============================
loki.url=${LOKI_URL:http://localhost:3100}
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# ===============================
# DEVTOOLS
# ===============================
spring.devtools.restart.enabled=false