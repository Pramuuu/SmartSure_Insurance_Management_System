# ===============================
# APPLICATION INFO
# ===============================
spring.application.name=ApiGatewaySmartSure
server.port=8080

# ===============================
# EUREKA (SERVICE DISCOVERY)
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# Automatically map routes using service names (lb://SERVICE_NAME)
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# ===============================
# JWT CONFIG (USED BY GATEWAY)
# ===============================
jwt.secret=767BI36HSIUNYD7352198N1SV12BS62428748NDH7878BXB7B65D326B67SBVV6VS62545265776XBHG
jwt.expiration=86400000

# ===============================
# INTERNAL SECURITY (VERY IMPORTANT)
# ===============================
# Used to secure communication between microservices
internal.secret=JHGUY72638DEGWRT7D4365N89SOQL89234Y3IUTBR7DT4NQ3479387DNBYFGR366746823BETYX

# ===============================
# CORS CONFIG (FOR FRONTEND)
# ===============================
cors.allowed.origins=http://localhost:3000,http://localhost:4200

# ===============================
# GATEWAY ROUTES
# ===============================

# ===============================
# GATEWAY ROUTES (UPDATED)
# ===============================

spring.cloud.gateway.server.webflux.routes[0].id=authServiceUser
spring.cloud.gateway.server.webflux.routes[0].uri=lb://authservice
spring.cloud.gateway.server.webflux.routes[0].predicates=Path=/user/**

spring.cloud.gateway.server.webflux.routes[1].id=authServiceApi
spring.cloud.gateway.server.webflux.routes[1].uri=lb://authservice
spring.cloud.gateway.server.webflux.routes[1].predicates=Path=/api/auth/**

spring.cloud.gateway.server.webflux.routes[2].id=policyServicePolicies
spring.cloud.gateway.server.webflux.routes[2].uri=lb://POLICYSERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates=Path=/api/policies/**

spring.cloud.gateway.server.webflux.routes[3].id=policyServiceTypes
spring.cloud.gateway.server.webflux.routes[3].uri=lb://POLICYSERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates=Path=/api/policy-types/**


spring.cloud.gateway.server.webflux.routes[4].id=claimService
spring.cloud.gateway.server.webflux.routes[4].uri=lb://claimservice
spring.cloud.gateway.server.webflux.routes[4].predicates=Path=/api/claims/**

spring.cloud.gateway.server.webflux.routes[5].id=adminService
spring.cloud.gateway.server.webflux.routes[5].uri=lb://adminservice
spring.cloud.gateway.server.webflux.routes[5].predicates=Path=/api/admin/**

spring.cloud.gateway.server.webflux.routes[6].id=paymentService
spring.cloud.gateway.server.webflux.routes[6].uri=lb://paymentservice
spring.cloud.gateway.server.webflux.routes[6].predicates=Path=/api/payments/**

# ===============================
# LOGGING (DEBUGGING SECURITY)
# ===============================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.security=DEBUG

# ===============================
# OBSERVABILITY - TRACING (Zipkin)
# ===============================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# ===============================
# OBSERVABILITY - PROMETHEUS METRICS
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.access=unrestricted
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# ===============================
# LOKI URL
# ===============================
loki.url=http://localhost:3100